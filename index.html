<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Essentials</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Freckle+Face&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <nav class="navbar">
      <div class="container navbar__inner">
        <form action="Shop/shop.html" method="get" class="navbar__search">
          <input type="text" name="query" placeholder="Search products..." class="navbar__search-input">
        </form>
        <a href="index.html" class="navbar__logo">Student<br>Essentials</a>

        <ul class="navbar__links">
          <li><a href="Shop/shop.html">SHOP</a></li>
          <li><a href="Cart/cart.html">CART</a></li>
        </ul>



      </div>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero__content">
        <img src="assets/hero-image.png" alt="Hero Image" class="hero__image">
        <h1>Welcome to Student Essentials</h1>
        <p>Your one-stop shop for all your student needs!</p>
        <a href="Shop/shop.html" class="btn">Shop Now</a>
      </div>
        <img src="assets/planner.jpg" alt="Planner" class="hero__product-image">
        <img src="assets/backpack.png" alt="Backpack" class="hero__product-image">
        <img src="assets/notebook.jpg" alt="Notebook" class="hero__product-image">
        <img src="assets/pens.jpg" alt="Pens" class="hero__product-image">
      
    </section>
    
  </main>
<footer>
  <div class="container">
    <p>Student Essentials © 2026</p>

    <a class="about-link" href="About/about.html">

    </a>
