<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Essentials</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <nav class="navbar">
      <div class="container navbar__inner">
        <a href="index.html" class="navbar__logo">Student Essentials</a>
        <ul class="navbar__links">
          <li><a href="Shop/shop.html">Shop</a></li>
          <li><a href="About/about.html">About</a></li>
          <li><a href="Cart/cart.html">Cart</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="container hero__content">
        <img src="assets/hero-image.png" alt="Hero Image" class="hero__image">
        <h1>Welcome to Student Essentials</h1>
        <p>Your one-stop shop for all your student needs!</p>
        <a href="Shop/shop.html" class="btn">Shop Now</a>

        <img src="assets/AirPods.png" alt="AirPods" class="hero__product-image">
        <img src="assets/backpack.png" alt="Backpack" class="hero__product-image">
        <img src="assets/book.png" alt="Laptop" class="hero__product-image">
        <img src="assets/image.png" alt="image" class="hero__product-image">
      </div>
    </section>
    
  </main>

  <footer>
    <div class="container">
      <p>Student Essentials © 2026</p>
      <li class="about-link"><a href="About/about.html">About Us</a></li>

    </div>
  </footer>

  <script src="js/main.js"></script>

</html>
