<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Freckle+Face&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header>
    <nav class="navbar">
      <div class="container navbar__inner">
        <form action="../Shop/shop.html" method="get" class="navbar__search">
          <input type="text" name="query" placeholder="Search products..." class="navbar__search-input">
        </form>
        <a href="../index.html" class="navbar__logo">Student<br>Essentials</a>

        <ul class="navbar__links">
          <li><a href="../index.html">HOME</a></li>
          <li><a href="../Cart/cart.html">CART</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <main>

    <section class="shop">
        <div class="shop__content">
            <h1>Shop</h1>
            <p>Explore our wide range of products for students!</p>
        </div>

        <div class="shop__products">
            <div class="product-card">
                <div class="half-product-card">
                    <img src="../assets/book.png" alt="Laptop" class="product-card__image">
                </div>
                
                <h2 class="product-card__name">Notebook</h2>
                <p class="product-card__price">$999.99</p>
                <div class="product-card__buttons">
                        <a href="../ProductDetails/ProductDetails.html">
                            <button class="btn-details">See Details</button>
                        </a>
                        
                        <button class="product-card__button">Add to Cart</button>
                        
                </div>
            </div>
            <div class="product-card">

                <div class="half-product-card">
                   <img src="../assets/backpack.png" alt="Backpack" class="product-card__image">
                </div>

                <h2 class="product-card__name">Backpack</h2>
                <p class="product-card__price">$49.99</p>

                <div class="product-card__buttons">
                    <a href="../ProductDetails/ProductDetails.html">
                        <button class="btn-details">See Details</button>
                    </a>
    
                    <button class="product-card__button">Add to Cart</button>
                    
                </div>

            </div>
            <div class="product-card">

                <div class="half-product-card">
                    <img src="../assets/AirPods.png" alt="AirPods" class="product-card__image">
                </div>

                
                <h2 class="product-card__name">AirPods</h2>
                <p class="product-card__price">$199.99</p>
                <div class="product-card__buttons">
                    <a href="../ProductDetails/ProductDetails.html">
                        <button class="btn-details">See Details</button>
                    </a>
                    
                    <button class="product-card__button">Add to Cart</button>
            
                </div>
            </div>
    </section>
      
  </main>
<footer>
  <div class="container">
    <p>Student Essentials © 2026</p>

    <a class="about-link" href="../About/about.html">
      ABOUT US
    </a>
  </div>
</footer>
 

  <script src="../js/main.js"></script>
</body>
</html>
